name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Check formatting
        shell: bash
        run: |
          test -z "$(gofmt -l .)"

      - name: Parse ImmortalWrt installer script
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile('scripts/install-immortalwrt.ps1', [ref]$tokens, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run tests
        run: go test ./...

      - name: Run tests with coverage
        run: go test -cover ./...

      - name: Run vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

  build_release:
    name: Build and Release
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build binaries
        shell: bash
        run: bash ./scripts/build.sh all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/njupt-net-windows-amd64.exe
            dist/njupt-net-linux-amd64
            dist/njupt-net-linux-arm64
            dist/njupt-net-darwin-arm64
          generate_release_notes: true
